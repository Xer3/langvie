name: langvie
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  dio: ^5.7.0
  go_router: ^14.2.0
  image_picker: ^1.1.2
  speech_to_text: ^7.3.0
  flutter_riverpod: ^2.5.1
  flutter_tts: ^3.8.5
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.6.12
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/avatars/
    - assets/logo.png
    - assets/app_icon.png
    - assets/app_icon_fg.png
    - assets/app_icon_bg.png

flutter_launcher_icons:
  android: true
  ios: true

  image_path: assets/app_icon.png
  remove_alpha_ios: true

  adaptive_icon_foreground: "assets/app_icon_fg.png"
  adaptive_icon_background: "assets/app_icon_bg.png"

  min_sdk_android: 21